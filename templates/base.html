<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViQA — AI Question Answering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161b27;
            --surface2: #1e2535;
            --border: #2a3347;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --text: #e2e8f0;
            --text-muted: #8892a4;
            --success: #10b981;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 10%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }

        header {
            display: flex;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(13, 15, 20, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>

<body>
    <header>
        <a href="{{ url_for('index') }}" class="logo">
            <div class="logo-icon">&#129504;</div>
            <div>
                <div class="logo-text">ViQA</div>
                <div class="logo-sub">Vietnamese Question Answering</div>
            </div>
        </a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
